<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>student information</title>
    <link rel="stylesheet" href="student information.css">
</head>
<body>
    <center>
    <h1>STUDENT INFORMATION</h1>
    </center>
    <div class="allign">
    <h3>NAME</h3>
    <input type="text" placeholder="ENTER YOUR NAME">
    <h3>REGISTER NUMBER</h3>
    <input type="number" placeholder="ENTER YOUR REG NO">
    <h3>DEPARTMENT</h3>
    <input type="text" placeholder="ENTER YOUR DEPARTMENT">

    <input type="text" placeholder="ENTER YOUR FATHER'S NAME">
    <h3>MOTHER'S NAME</h3>
    <input type="text" placeholder="ENTER YOUR MOTHER'S NAME">
    <h3>YEAR OF PASSING OUT</h3>
    <input type="number" placeholder="ENTER THE YEAR OF PASSING OUT">

    <input type="number" placeholder="ENTER YOUR DATE OF BIRTH">
    <button>SUBMIT</button>
    </div>
